# CI — the same verification loop as `pnpm verify` (repo checks + turbo run lint typecheck
# build test eval:ci; `build` depends on `test`, so no build is ever cached from red tests).
#
# Deterministic by design: eval:ci uses mock-model evals, so NO secrets are required for a
# green run. Optional (speeds things up via Vercel Remote Cache, harmless when absent):
#   - secret  TURBO_TOKEN — Vercel access token
#   - variable TURBO_TEAM — Vercel team slug
#
# Note: `turbo boundaries` is intentionally NOT run here — it flags eve-generated
# `.eve/nitro` build output (which imports from node_modules/.pnpm via relative paths) as a
# cross-package violation whenever build artifacts exist, and offers no way to exclude
# generated files. Upstream: https://github.com/vercel/turborepo/discussions/9435
# (TODO(maintainer): swap in the filed issue URL). Until fixed, the "Repo checks" step
# below enforces app isolation via scripts/check-cross-app-imports.mjs.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Empty values are fine: turbo simply runs without remote cache.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: `--affected` resolves the merge base against the base branch
          # (shallow clones make turbo fall back to running everything).
          fetch-depth: 0

      # No `version:` — pnpm/action-setup reads `packageManager` from package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          # Caches the pnpm store (works with or without Turbo remote cache).
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Repo-wide checks, as turbo root tasks (cached; defined in turbo.json):
      # cross-app imports (stand-in for `turbo boundaries`, see header note),
      # env contract (AGENTS.md hard rule 3), and knip (dead code / unused deps).
      # Deliberately a separate, unfiltered invocation: root tasks are skipped by
      # --affected on app-only PRs (--filter overrides it rather than unioning),
      # and these contracts must hold repo-wide on every change.
      - name: Repo checks (imports, env contract, knip)
        run: pnpm turbo run check:imports check:env-contract knip

      # PRs: only packages affected vs. the base branch (turbo auto-detects GITHUB_BASE_REF).
      # --continue=dependencies-successful (not bare --continue = always): `build`
      # depends on `test`, so a red test must skip that package's build — otherwise
      # a build from failing tests lands in the remote cache, and Vercel deploy
      # builds replay that cache ("Detected Turbo" + remote caching in build logs).
      - name: Verify (affected)
        if: github.event_name == 'pull_request'
        run: pnpm turbo run lint typecheck build test eval:ci --affected --continue=dependencies-successful

      # Pushes to main: full run, no --affected.
      - name: Verify (all)
        if: github.event_name == 'push'
        run: pnpm turbo run lint typecheck build test eval:ci --continue=dependencies-successful

      # Best-effort: eve writes eval results (incl. JUnit XML when requested) under .eve/evals.
      - name: Upload eval artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: |
            **/.eve/evals/**
            **/eval-junit.xml
          # .eve is a dotdir; v4 skips hidden files unless this is set.
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 14
